name: Build and Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.1"

      - name: Build release binary
        run: swift build -c release

      - name: Sign binary
        run: |
          codesign --sign - \
            --entitlements signing/claudec.entitlements \
            --force .build/release/claudec

      - name: Package binary
        run: |
          cd .build/release
          tar czf claudec-arm64-macos.tar.gz claudec
          mv claudec-arm64-macos.tar.gz "$GITHUB_WORKSPACE/"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: claudec-arm64-macos.tar.gz
